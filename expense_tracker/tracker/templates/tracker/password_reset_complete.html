<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Reset Complete — SpendWise</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body{background:#eef2ff;color:#0A0C10;font-family:'Instrument Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:#ffffff;border-radius:18px;padding:40px;max-width:520px;width:100%;box-shadow:0 18px 40px rgba(15,23,42,0.08);border:1px solid rgba(37,99,235,0.15);}
  .title{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:12px;}
  .text{color:#5F6368;font-size:0.97rem;line-height:1.7;margin-bottom:26px;}
  .auth-link a{color:#2563eb;font-weight:700;text-decoration:none;}
  .auth-link a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="card">
  <div class="title">Password reset complete</div>
  <div class="text">Your password has been successfully changed. You can now sign in with your new password.</div>
  <div class="auth-link">Go to <a href="{% url 'login' %}">Sign in</a>.</div>
</div>
</body>
</html>
